<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Robot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.2rem; background: #0f3460; border-bottom: 2px solid #e94560; }
    .brand { font-size: 1.2rem; font-weight: 700; color: #fff; }
    #status { font-size: 0.8rem; }
    .ok { color: #4caf50; } .busy { color: #ff9800; } .err { color: #f44336; }
    .layout { display: flex; gap: 1.2rem; padding: 1.2rem; flex: 1; overflow: hidden; }
    .board-col { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    table.chess-table { border-collapse: collapse; border: 2px solid #555; }
    .chess-square { width: 64px; height: 64px; text-align: center; vertical-align: middle; }
    .chess-square.light { background: #f0d9b5; } .chess-square.dark { background: #b58863; }
    .rank-label { width: 22px; color: #888; font-size: 0.75rem; text-align: center; }
    .file-label { height: 22px; color: #888; font-size: 0.75rem; text-align: center; }
    .chess-piece { font-size: 2.6rem; line-height: 1; user-select: none; }
    #turn { font-size: 0.85rem; color: #aaa; }
    .controls-col { display: flex; flex-direction: column; gap: 0.8rem; min-width: 320px; max-width: 380px; overflow-y: auto; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 0.8rem 1rem; }
    .card h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .05em; color: #e94560; margin-bottom: 0.6rem; }
    .row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    input[type="number"], input[type="text"] { background: #1a1a2e; color: #eee; border: 1px solid #0f3460; border-radius: 4px; padding: 0.35rem 0.5rem; font-size: 0.9rem; }
    input[type="number"] { width: 60px; } .sq { width: 46px; text-align: center; font-family: monospace; }
    button { border: none; border-radius: 4px; padding: 0.4rem 0.8rem; font-size: 0.85rem; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .p { background: #4caf50; color: #fff; } .s { background: #1565c0; color: #fff; }
    .w { background: #f57c00; color: #fff; } .d { background: #c62828; color: #fff; } .m { background: #37474f; color: #eee; }
    .sm { font-size: 0.75rem; padding: 0.25rem 0.5rem; }
    .history-card { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    #history-list { list-style-position: inside; overflow-y: auto; flex: 1; font-size: 0.82rem; font-family: monospace; }
    #history-list li { padding: 0.2rem 0; border-bottom: 1px solid #0f3460; color: #ccc; }
    .tag { display: inline-block; padding: 0 0.35rem; border-radius: 3px; font-size: 0.75rem; margin-right: 0.3rem; }
    .tag-go { background: #2e7d32; } .tag-move { background: #1565c0; } .tag-reset { background: #e65100; } .tag-wipe { background: #b71c1c; } .tag-cache { background: #37474f; }
    .spinner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .spinner-overlay.hidden { display: none; }
    .spinner { width: 48px; height: 48px; border: 5px solid #fff3; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
    <span class="brand">♟ Chess Robot</span>
    <span id="status" class="ok">Ready</span>
  </nav>
  <div class="layout">
    <div class="board-col">
      <div id="board"></div>
      <div id="turn"></div>
    </div>
    <div class="controls-col">
      <div class="card">
        <h3>Robot Move</h3>
        <div class="row">
          <input id="go-n" type="number" value="1" min="1" />
          <label>moves</label>
          <button class="p" onclick="cmdGo()">Go</button>
        </div>
      </div>
      <div class="card">
        <h3>Direct Move</h3>
        <div class="row">
          <input id="from" type="text" class="sq" placeholder="e2" maxlength="2" />
          <span>→</span>
          <input id="to" type="text" class="sq" placeholder="e4" maxlength="2" onkeydown="if(event.key==='Enter')cmdMove()" />
          <input id="move-n" type="number" value="1" min="1" style="width:48px" />
          <button class="s" onclick="cmdMove()">Move</button>
        </div>
      </div>
      <div class="card">
        <h3>Maintenance</h3>
        <div class="row">
          <button class="w" onclick="cmdSimple('/api/reset','reset','Reset the physical board?')">Reset</button>
          <button class="d" onclick="cmdSimple('/api/wipe','wipe','Wipe game state?')">Wipe</button>
          <button class="m" onclick="cmdSimple('/api/clear-cache','cache')">Clear Cache</button>
          <button class="m" onclick="refresh()">Refresh</button>
        </div>
      </div>
      <div class="card history-card">
        <div class="hdr">
          <h3>Move History</h3>
          <button class="m sm" onclick="clearHistory()">Clear</button>
        </div>
        <ol id="history-list" reversed></ol>
      </div>
    </div>
  </div>
  <div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

  <script>
    const PIECES = {K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};
    let history = [];
    let timer = null;

    function renderBoard(fen) {
      const [placement, color] = fen.split(' ');
      const rows = placement.split('/');
      const table = document.createElement('table');
      table.className = 'chess-table';
      rows.forEach((row, ri) => {
        const tr = document.createElement('tr');
        const lbl = document.createElement('td');
        lbl.className = 'rank-label'; lbl.textContent = 8 - ri;
        tr.appendChild(lbl);
        let ci = 0;
        for (const ch of row) {
          if (ch >= '1' && ch <= '8') { for (let i = 0; i < +ch; i++) tr.appendChild(sq(ri, ci++, null)); }
          else tr.appendChild(sq(ri, ci++, ch));
        }
        table.appendChild(tr);
      });
      const fr = document.createElement('tr'); fr.appendChild(document.createElement('td'));
      for (const f of 'abcdefgh') { const td = document.createElement('td'); td.className='file-label'; td.textContent=f; fr.appendChild(td); }
      table.appendChild(fr);
      document.getElementById('board').innerHTML = ''; document.getElementById('board').appendChild(table);
      document.getElementById('turn').textContent = color === 'w' ? 'White to move' : 'Black to move';
    }

    function sq(ri, ci, piece) {
      const td = document.createElement('td');
      td.className = 'chess-square ' + ((ri+ci)%2===0?'light':'dark');
      if (piece) { const s = document.createElement('span'); s.className='chess-piece'; s.textContent=PIECES[piece]||''; td.appendChild(s); }
      return td;
    }

    function setStatus(msg, cls) { const el=document.getElementById('status'); el.textContent=msg; el.className=cls; }
    function setBusy(b) { document.getElementById('spinner').classList.toggle('hidden',!b); document.querySelectorAll('button').forEach(btn=>btn.disabled=b); }

    async function refresh() {
      try {
        const res = await fetch('/api/state');
        if (!res.ok) { setStatus('Error: '+await res.text(),'err'); return; }
        const data = await res.json();
        if (data.fen) renderBoard(data.fen);
        if (data.history) { history = data.history; renderHistory(); }
        setStatus('Ready','ok');
      } catch(e) { setStatus('Error: '+e.message,'err'); }
    }

    function renderHistory() {
      const list = document.getElementById('history-list'); list.innerHTML='';
      [...history].reverse().forEach(h => {
        const li = document.createElement('li');
        li.innerHTML = `<span class="tag tag-${h.type}">${h.type}</span>${h.label}`;
        list.appendChild(li);
      });
    }

    async function api(url, body) {
      setBusy(true); setStatus('Working...','busy');
      if (timer) clearInterval(timer);
      try {
        const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : '{}'});
        if (!r.ok) { setStatus('Error: '+await r.text(),'err'); return null; }
        const ct = r.headers.get('Content-Type')||'';
        return ct.includes('json') ? await r.json() : {};
      } catch(e) { setStatus('Error: '+e.message,'err'); return null; }
      finally { setBusy(false); setStatus('Ready','ok'); await refresh(); startTimer(); }
    }

    async function cmdGo() {
      const n = +document.getElementById('go-n').value || 1;
      const res = await api('/api/go', {n});
      if (res !== null) history = (await (await fetch('/api/state')).json()).history, renderHistory();
    }

    async function cmdMove() {
      const from = document.getElementById('from').value.trim().toLowerCase();
      const to   = document.getElementById('to').value.trim().toLowerCase();
      const n    = +document.getElementById('move-n').value || 1;
      if (!from || !to) { alert('Enter from and to squares.'); return; }
      const res = await api('/api/move', {from, to, n});
      if (res !== null) history = (await (await fetch('/api/state')).json()).history, renderHistory();
    }

    async function cmdSimple(url, type, confirm_msg) {
      if (confirm_msg && !confirm(confirm_msg)) return;
      const res = await api(url);
      if (res !== null) history = (await (await fetch('/api/state')).json()).history, renderHistory();
    }

    function clearHistory() { history = []; renderHistory(); }

    function startTimer() { if(timer) clearInterval(timer); timer = setInterval(refresh, 5000); }

    refresh().then(startTimer);
  </script>
</body>
</html>
